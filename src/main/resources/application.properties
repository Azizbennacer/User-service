spring.application.name=user-service
server.port=8102

spring.datasource.url=jdbc:postgresql://localhost:5432/user_db
spring.datasource.username=playzone
spring.datasource.password=playzonepass
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.h2.console.enabled=false

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Same secret as auth-service. Override via APP_JWT_SECRET env var in production.
app.jwt.secret=${APP_JWT_SECRET:U21hcnREb2NEZXZlbG9wbWVudEtleVNob3VsZEJlQXRMZWFzdDMyQnl0ZXM=}

app.cors.allowed-origins=http://localhost:4200
app.uploads.dir=uploads/photos
